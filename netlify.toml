[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  NODE_OPTIONS = "--max_old_space_size=4096"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Force HTTPS  -  redirect all HTTP traffic to HTTPS ──────────────────────────
[[redirects]]
  from   = "http://norvaos.ca/*"
  to     = "https://norvaos.ca/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.norvaos.ca/*"
  to     = "https://norvaos.ca/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://*.netlify.app/*"
  to     = "https://:splat.netlify.app/:splat"
  status = 301
  force  = true

# ── Blue-Green Deployment (Directive 041) ────────────────────────────────────
# Production (Blue): main branch deploys  -  norvaos.ca
# Staging (Green):   deploy previews + branch deploys  -  staging.norvaos.ca
#
# Deploy context overrides:
#   - Production context inherits [build] above (Blue slot)
#   - Branch-deploy and deploy-preview contexts use Green slot env vars
# ─────────────────────────────────────────────────────────────────────────────

[context.production.environment]
  NEXT_PUBLIC_DEPLOY_SLOT = "blue"
  NEXT_PUBLIC_DEPLOY_ENV  = "production"

[context.branch-deploy.environment]
  NEXT_PUBLIC_DEPLOY_SLOT = "green"
  NEXT_PUBLIC_DEPLOY_ENV  = "staging"

[context.deploy-preview.environment]
  NEXT_PUBLIC_DEPLOY_SLOT = "green"
  NEXT_PUBLIC_DEPLOY_ENV  = "staging"

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection           = "1; mode=block"
