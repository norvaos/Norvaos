# =============================================================================
# LexCRM CI/CD Pipeline
# =============================================================================
# Triggers:
#   - Pull requests to main/develop → runs lint + type-check + build
#   - Push to main → deploys to staging, then production (with approval)
#   - Tags (v*) → creates GitHub Release
# =============================================================================

name: CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual CI gate verification'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Enforcement Spec Gate (PR only) ───────────────────────────────
  enforcement-gate:
    name: Enforcement Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for merge-base

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run enforcement spec gate
        run: npx tsx scripts/check-spec-updated.ts --base origin/${{ github.base_ref }}

      - name: Run tests
        run: pnpm vitest run

  # ─── Lint, Type-check, Test, Build ────────────────────────────────
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    env:
      # Supabase placeholders — tests mock the Supabase client so real
      # credentials are not needed. Values must be non-empty strings.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key_for_ci
      WORKER_SECRET: test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high || echo "::warning::Security vulnerabilities found — review pnpm audit output above"

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Sprint 6 tests
        # Runs all Sprint 6 test files in lib/services/__tests__/ with verbose
        # output so failures are clearly visible in the CI log.
        # Sprint 6 files covered:
        #   - refusal-engine.test.ts    (JR deadline computation + input validation)
        # Additional Sprint 6 test files added to lib/services/__tests__/ are
        # automatically picked up by the glob pattern in vitest.config.ts.
        run: pnpm exec vitest run --reporter=verbose lib/services/__tests__/

      - name: Run all tests
        run: pnpm exec vitest run --reporter=verbose

      - name: Schema drift check
        run: node scripts/check-schema-drift.mjs
        env:
          SUPABASE_DB_URL: ${{ secrets.STAGING_DB_URL }}
        continue-on-error: ${{ github.event_name == 'push' }}

      - name: Build
        run: pnpm build
        env:
          # Provide dummy env vars for build (not real secrets)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://app.lexcrm.com

      - name: Verify version API
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Build version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        id: version

  # ─── Deploy to Staging ───────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.lexcrm.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--env staging'
        env:
          CRON_SECRET: ${{ secrets.STAGING_CRON_SECRET }}

  # ─── Run Database Migrations (Staging) ───────────────────────────
  migrate-staging:
    name: Migrate Staging DB
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pg
        run: npm install pg

      - name: Check migration status
        run: node scripts/migrate.mjs --status
        env:
          SUPABASE_DB_URL: ${{ secrets.STAGING_DB_URL }}

      - name: Apply pending migrations
        run: node scripts/migrate.mjs
        env:
          SUPABASE_DB_URL: ${{ secrets.STAGING_DB_URL }}

  # ─── Staging API Validation ─────────────────────────────────────
  validate-staging:
    name: Validate Staging APIs
    needs: migrate-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run staging API validation
        run: npx tsx scripts/staging-api-validation.ts
        env:
          STAGING_URL: https://staging.lexcrm.com
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          ADMIN_EMAIL: ${{ secrets.STAGING_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.STAGING_ADMIN_PASSWORD }}
          LAWYER_EMAIL: ${{ secrets.STAGING_LAWYER_EMAIL }}
          LAWYER_PASSWORD: ${{ secrets.STAGING_LAWYER_PASSWORD }}
          PARALEGAL_EMAIL: ${{ secrets.STAGING_PARALEGAL_EMAIL }}
          PARALEGAL_PASSWORD: ${{ secrets.STAGING_PARALEGAL_PASSWORD }}
          CLERK_EMAIL: ${{ secrets.STAGING_CLERK_EMAIL }}
          CLERK_PASSWORD: ${{ secrets.STAGING_CLERK_PASSWORD }}
          TENANT_B_ADMIN_EMAIL: ${{ secrets.STAGING_TENANT_B_ADMIN_EMAIL }}
          TENANT_B_ADMIN_PASSWORD: ${{ secrets.STAGING_TENANT_B_ADMIN_PASSWORD }}
          CRON_SECRET: ${{ secrets.STAGING_CRON_SECRET }}

  # ─── Deploy to Production ────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging, migrate-staging, validate-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://app.lexcrm.com
      # ⬆️ This creates a manual approval gate in GitHub.
      # Go to Settings > Environments > production > add required reviewers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Production deployment placeholder
        run: |
          echo "Deploy to production environment"
          echo "Configure your deployment platform in this step"
          echo "Version: $(node -p "require('./package.json').version")"

  # ─── Create GitHub Release on Tag ────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
